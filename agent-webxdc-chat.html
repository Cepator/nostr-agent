<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rivet Agent</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:0;margin:0;min-height:100vh;display:flex;flex-direction:column}
*{box-sizing:border-box}
#header{padding:12px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0}
#status{color:#58a6ff;font-size:12px}
#status.ready{color:#3fb950}
#status.thinking{color:#f79009}
#messages{flex:1;overflow-y:auto;padding:16px;min-height:0}
.msg{margin:8px 0;max-width:85%}
.msg.user{margin-left:auto;background:#1f6feb;color:white;padding:8px 12px;border-radius:12px 12px 4px 12px}
.msg.agent{background:#21262d;padding:8px 12px;border-radius:12px 12px 12px 4px}
#input-area{flex-shrink:0;padding:16px;border-top:1px solid #30363d;display:flex;gap:8px}
#input{flex:1;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:14px;resize:none;min-height:36px;max-height:120px}
#input:focus{outline:none;border-color:#58a6ff}
#send{background:#238636;color:white;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer}
#send:disabled{opacity:0.5;cursor:default}
</style>
</head>
<body>
<div id="header">
  <h3 style="margin:0">🔧 Rivet</h3>
  <div id="status">Connecting...</div>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" placeholder="Say something..." rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
var messages = [];
var isReady = false;
var messageId = 0;

function addMessage(role, content) {
  messages.push({role: role, content: content, id: Date.now()});
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior: 'smooth'});
}

function setStatus(text, className) {
  var status = document.getElementById('status');
  status.textContent = text;
  status.className = className || '';
}

function sendMessage() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text || !isReady) return;
  
  input.value = '';
  input.disabled = true;
  document.getElementById('send').disabled = true;
  
  addMessage('user', text);
  setStatus('Thinking...', 'thinking');
  
  // Send via WebXDC update
  if (window.webxdc && window.webxdc.sendUpdate) {
    window.webxdc.sendUpdate({
      payload: {
        type: 'chat',
        message: text,
        id: ++messageId
      }
    }, 'User message');
  } else {
    // Fallback for non-WebXDC
    setTimeout(function() {
      addMessage('agent', 'Sorry, I can only work properly in a WebXDC environment.');
      setStatus('Ready', 'ready');
      input.disabled = false;
      document.getElementById('send').disabled = false;
    }, 1000);
  }
}

// WebXDC integration
if (window.webxdc) {
  console.log('[agent] WebXDC environment detected');
  setStatus('Ready - Send me a message!', 'ready');
  isReady = true;
  
  // Listen for updates from the host
  window.webxdc.setUpdateListener(function(update) {
    console.log('[agent] Received update:', update);
    
    if (update.payload && update.payload.type === 'response') {
      addMessage('agent', update.payload.message);
      setStatus('Ready', 'ready');
      document.getElementById('input').disabled = false;
      document.getElementById('send').disabled = false;
    } else if (update.payload && update.payload.type === 'error') {
      addMessage('agent', '⚠️ ' + update.payload.message);
      setStatus('Error - Try refreshing', 'err');
      document.getElementById('input').disabled = false;
      document.getElementById('send').disabled = false;
    }
  });
  
  addMessage('agent', 'Hello! I\'m Rivet, an AI agent running as a WebXDC app. The host device runs my AI brain, so I can actually think and respond. Try asking me something!');
} else {
  setStatus('Not in WebXDC - limited functionality', 'err');
  addMessage('agent', 'I need to run inside a WebXDC environment to work properly.');
}

// Event listeners
document.getElementById('send').onclick = sendMessage;
document.getElementById('input').onkeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

// Auto-resize textarea
document.getElementById('input').oninput = function() {
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
};
</script>
</body>
</html>
