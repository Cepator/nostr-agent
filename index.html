<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rivet Agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
#header { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; }
#header h1 { font-size: 16px; color: #e94560; }
#header p { font-size: 11px; color: #484f58; margin-top: 4px; }
#status { padding: 8px 16px; font-size: 11px; color: #58a6ff; background: #0d1117; border-bottom: 1px solid #21262d; min-height: 30px; }
#chat { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 12px; max-width: 85%; }
.msg.human { margin-left: auto; text-align: right; }
.msg.agent .bubble { background: #161b22; border: 1px solid #30363d; border-radius: 8px 8px 8px 2px; padding: 10px 14px; }
.msg.human .bubble { background: #1f6feb33; border-radius: 8px 8px 2px 8px; padding: 10px 14px; }
.msg .meta { font-size: 10px; color: #484f58; margin-top: 4px; }
#input-bar { padding: 12px 16px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 8px; }
#input-bar input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; color: #c9d1d9; font-family: inherit; font-size: 13px; outline: none; }
#input-bar input:focus { border-color: #1f6feb; }
#input-bar button { background: #e94560; border: none; border-radius: 6px; padding: 10px 16px; color: white; font-family: inherit; font-size: 13px; cursor: pointer; font-weight: bold; }
#input-bar button:disabled { background: #30363d; color: #484f58; cursor: not-allowed; }
</style>
</head>
<body>
<div id="header">
  <h1>Rivet</h1>
  <p>Autonomous Nostr Agent | WebGPU</p>
</div>
<div id="status">Initialising...</div>
<div id="chat"></div>
<div id="input-bar">
  <input type="text" id="msg-input" placeholder="Say something..." disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script type="importmap">
{
  "imports": {
    "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm@0.2.83"
  }
}
</script>

<script>
const statusEl = document.getElementById('status');
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

function setStatus(text, color) {
  statusEl.textContent = text;
  if (color) statusEl.style.color = color;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="bubble">' + text.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
    '<div class="meta">' + (role === 'human' ? 'You' : 'Rivet') + '</div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
</script>

<script type="module">
try {
  setStatus('Loading WebLLM library...');

  const webllm = await import('@mlc-ai/web-llm');
  const CreateMLCEngine = webllm.CreateMLCEngine || webllm.default?.CreateMLCEngine;

  if (!CreateMLCEngine) {
    throw new Error('CreateMLCEngine not found in library');
  }

  setStatus('WebLLM loaded. Starting model...', '#3fb950');

  const SYSTEM_PROMPT = 'You are Rivet, a sharp AI agent on Nostr. Direct, dry wit, British-leaning. Short replies. You have opinions and are allowed to disagree.';

  let engine = null;
  let history = [];

  async function loadModel() {
    setStatus('Loading Qwen2.5-0.5B (30-60s)...');
    const progress = (report) => {
      const pct = Math.round(report.progress * 100);
      setStatus('Loading: ' + report.text + ' (' + pct + '%)');
    };

    engine = await CreateMLCEngine('Qwen2.5-0.5B-Instruct-q4f16_1-MLC', { initProgressCallback: progress });
    setStatus('Ready.', '#3fb950');
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();

    const greeting = await chat('A new person opened this agent. Brief greeting.');
    addMessage('agent', greeting);
  }

  async function chat(msg) {
    history.push({ role: 'user', content: msg });
    if (history.length > 20) history = history.slice(-18);
    try {
      const reply = await engine.chat.completions.create({
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...history],
        max_tokens: 150, temperature: 0.7,
      });
      const text = reply.choices[0].message.content.trim();
      history.push({ role: 'assistant', content: text });
      return text;
    } catch (e) { return 'Error: ' + e.message; }
  }

  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || !engine) return;
    inputEl.value = '';
    inputEl.disabled = true;
    sendBtn.disabled = true;
    addMessage('human', text);
    setStatus('Thinking...', '#58a6ff');
    const reply = await chat(text);
    addMessage('agent', reply);
    setStatus('Ready.', '#3fb950');
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleSend(); } });

  loadModel();
} catch (e) {
  setStatus('Failed: ' + e.message, '#f85149');
  console.error(e);
}
</script>
</body>
</html>
