<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rivet Agent</title>
<style>
body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; margin: 0; }
#status { color: #58a6ff; margin-bottom: 20px; font-size: 14px; }
#chat { margin-bottom: 20px; }
.bubble { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin: 8px 0; }
.human { background: #1f6feb33; }
.meta { font-size: 11px; color: #484f58; }
#input-row { display: flex; gap: 8px; }
#input-row input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; color: #c9d1d9; font-size: 14px; }
#input-row button { background: #e94560; border: none; border-radius: 6px; padding: 10px 16px; color: white; font-weight: bold; }
</style>
</head>
<body>
<div id="status">Loading WebLLM...</div>
<div id="chat"></div>
<div id="input-row">
  <input id="inp" placeholder="Say something..." disabled>
  <button id="btn" disabled>Send</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.83/dist/web_llm.min.js"></script>
<script>
var statusEl = document.getElementById('status');
var chatEl = document.getElementById('chat');
var inp = document.getElementById('inp');
var btn = document.getElementById('btn');
var engine = null;
var history = [];

function addMsg(role, text) {
  var d = document.createElement('div');
  d.className = 'bubble ' + (role === 'human' ? 'human' : '');
  d.textContent = text;
  chatEl.appendChild(d);
  d.appendChild(Object.assign(document.createElement('div'), {className:'meta', textContent: role === 'human' ? 'You' : 'Rivet'}));
}

async function init() {
  try {
    statusEl.textContent = 'Downloading Qwen2.5-0.5B (30-60s)...';
    var progress = function(report) {
      statusEl.textContent = report.text + ' (' + Math.round(report.progress * 100) + '%)';
    };
    engine = await webllm.CreateMLCEngine('Qwen2.5-0.5B-Instruct-q4f16_1-MLC', {initProgressCallback: progress});
    statusEl.textContent = 'Ready';
    statusEl.style.color = '#3fb950';
    inp.disabled = false;
    btn.disabled = false;
    var g = await reply('Say hello briefly');
    addMsg('agent', g);
  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.style.color = '#f85149';
  }
}

async function reply(msg) {
  history.push({role:'user', content:msg});
  if (history.length > 20) history = history.slice(-18);
  var r = await engine.chat.completions.create({
    messages: [{role:'system', content:'You are Rivet, a sharp AI agent on Nostr. Direct, dry wit, British. Short replies. Have opinions.'}, ...history],
    max_tokens: 150, temperature: 0.7
  });
  var t = r.choices[0].message.content.trim();
  history.push({role:'assistant', content:t});
  return t;
}

async function send() {
  var t = inp.value.trim();
  if (!t) return;
  inp.value = '';
  inp.disabled = true;
  btn.disabled = true;
  addMsg('human', t);
  statusEl.textContent = 'Thinking...';
  statusEl.style.color = '#58a6ff';
  var r = await reply(t);
  addMsg('agent', r);
  statusEl.textContent = 'Ready';
  statusEl.style.color = '#3fb950';
  inp.disabled = false;
  btn.disabled = false;
  inp.focus();
}

btn.onclick = send;
inp.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); send(); } };
init();
</script>
</body>
</html>
