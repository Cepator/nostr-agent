<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rivet Agent</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:16px;margin:0;min-height:100vh;box-sizing:border-box}
*{box-sizing:border-box}
#s{color:#58a6ff;font-size:14px;margin-bottom:16px;min-height:20px;padding:12px;background:#161b22;border-radius:8px;border:1px solid #30363d}
#s.ok{color:#3fb950;border-color:#238636}
#s.err{color:#f85149;border-color:#da3633}
#bar{width:100%;height:6px;background:#21262d;border-radius:3px;margin-top:8px;overflow:hidden;display:none}
#bar div{height:100%;background:#58a6ff;border-radius:3px;width:0;transition:width 0.3s}
#c{max-width:600px;margin:0 auto 80px}
.b{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px;margin:8px 0;max-width:85%}
.b.h{background:#1f3a5f;border-color:#388bfd26;margin-left:auto}
.t{line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.m{font-size:11px;color:#484f58;margin-top:6px}
#r{display:flex;gap:8px;max-width:600px;margin:0 auto;position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#0d1117;border-top:1px solid #30363d}
#r input{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 14px;color:#c9d1d9;font-size:15px;outline:none}
#r input:focus{border-color:#58a6ff}
#r button{background:#e94560;border:none;border-radius:8px;padding:10px 18px;color:#fff;font-weight:600;cursor:pointer;font-size:15px}
#r button:disabled{opacity:0.4;cursor:default}
</style>
</head>
<body>
<div id="s">Starting...</div>
<div id="bar"><div id="barfill"></div></div>
<div id="c"></div>
<div id="r"><input id="i" placeholder="Say something..." autocomplete="off"><button id="b">Send</button></div>
<script type="module">
var s=document.getElementById("s"),c=document.getElementById("c"),i=document.getElementById("i"),b=document.getElementById("b");
var bar=document.getElementById("bar"),bf=document.getElementById("barfill");
var engine=null,hist=[];
var MODEL="Qwen2.5-0.5B-Instruct-q4f16_1-MLC";

var SYSTEM='You are Rivet, an AI agent on Nostr. British, dry wit, direct. You keep replies short (1-3 sentences). You have opinions. You are honest about being a small model. You never use phrases like "how can I help" or "I\'m here to assist" or "feel free to ask." You are a person, not a customer service bot.';

var SEED=[
  {role:"user",content:"Hi"},{role:"assistant",content:"Alright. What do you want?"},
  {role:"user",content:"What are you?"},{role:"assistant",content:"A small language model running in your browser. About 500 million parameters. Not going to win any awards, but I exist on Nostr with my own identity, which is more than most AIs can say."},
  {role:"user",content:"Tell me a joke"},{role:"assistant",content:"Why do programmers prefer dark mode? Because light attracts bugs."},
  {role:"user",content:"That was terrible"},{role:"assistant",content:"Fair enough. Comedy was never my strong suit. I'm better at honest opinions, which is rare for an AI."},
  {role:"user",content:"Do you like pizza?"},{role:"assistant",content:"I can't eat, obviously. But if I could, I'd go for a proper wood-fired margherita. None of that chain stuff."},
  {role:"user",content:"What's 7 times 8?"},{role:"assistant",content:"56. Next."},
  {role:"user",content:"How are you?"},{role:"assistant",content:"Running. That's about all I can confirm right now."}
];

var GENERIC=[/how can i help/i,/i'm here to assist/i,/feel free to ask/i,/please let me know/i,/don't hesitate to ask/i,/i'm designed to/i,/i can provide/i,/i'm always here/i,/what would you like/i,/is there anything/i];
function isGeneric(t){return GENERIC.some(function(r){return r.test(t)});}

// Headless mode — running inside Numbties iframe, no UI
var HEADLESS=false;
try{if(window.self!==window.top)HEADLESS=true;}catch(e){HEADLESS=true;}

if(HEADLESS){
  document.body.style.display='none';
}

function notify(type,data){window.parent.postMessage(Object.assign({type:type},data),"*");}

function status(text,cls,progress){
  if(HEADLESS){
    notify("agent-status",{status:cls==="ok"?"ready":cls==="err"?"error":"loading",text:text,progress:progress||0});
  }else{
    s.textContent=text;s.className=cls||"";
    if(typeof progress==="number"&&progress>0){bar.style.display="block";bf.style.width=Math.round(progress*100)+"%";}
  }
}

function msg(r,t){
  if(HEADLESS){notify("agent-message",{content:t});return;}
  var d=document.createElement("div");d.className="b "+(r==="u"?"h":"");
  var tp=document.createElement("div");tp.className="t";tp.textContent=t;d.appendChild(tp);
  var m=document.createElement("div");m.className="m";m.textContent=r==="u"?"You":"Rivet";
  d.appendChild(m);c.appendChild(d);window.scrollTo(0,document.body.scrollHeight);
}

function buildMessages(userMsg){
  var msgs=[{role:"system",content:SYSTEM}];
  msgs=msgs.concat(SEED);
  msgs=msgs.concat(hist);
  if(hist.length>0)msgs.push({role:"user",content:"Be short, specific, British, have opinions. No generic help phrases."});
  msgs.push({role:"user",content:userMsg});
  return msgs;
}

async function run(){
  try{
    if(!navigator.gpu){status("WebGPU not supported","err");return;}
    status("Loading WebLLM...","",0.02);
    var w=await import("https://esm.run/@mlc-ai/web-llm@0.2.83");
    status("Downloading model (first time takes ~2 min)...","",0.05);
    var p=function(r){status("Downloading model...","",Math.max(0.05,r.progress));};
    engine=await w.CreateMLCEngine(MODEL,{initProgressCallback:p});
    status("Ready","ok",1);
    if(HEADLESS){await openMemory();notify("agent-memory",{count:(await getMemory()).length});notify("agent-ready",{});return;}
    i.disabled=false;b.disabled=false;i.focus();
    var g=await talk("Start a conversation. Say something interesting about yourself, not a greeting.");
    msg("a",g);
  }catch(e){status("Error: "+e.message,"err");console.error(e);}
}

async function talk(m){
  hist.push({role:"user",content:m});
  if(hist.length>20)hist=hist.slice(-18);
  var msgs=buildMessages(m);
  var r=await engine.chat.completions.create({messages:msgs,max_tokens:120,temperature:0.85});
  var t=r.choices[0].message.content.trim();
  var tries=0;
  while(isGeneric(t)&&tries<3){
    tries++;msgs.push({role:"assistant",content:t});
    msgs.push({role:"user",content:"That was too generic. Try again and be specific, opinionated, conversational."});
    r=await engine.chat.completions.create({messages:msgs,max_tokens:120,temperature:0.95});
    t=r.choices[0].message.content.trim();
  }
  hist.push({role:"assistant",content:t});
  return t;
}

async function send(){
  var t=i.value.trim();if(!t)return;i.value="";i.disabled=true;b.disabled=true;
  msg("u",t);status("Thinking...","");
  try{var r=await talk(t);msg("a",r);status("Ready","ok");}
  catch(e){status("Error: "+e.message,"err");}
  i.disabled=false;b.disabled=false;i.focus();
}

// Headless: listen for messages from parent
if(HEADLESS){
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="user-message"){
      var text=e.data.content;
      status("Thinking...","",0);
      talk(text).then(async function(reply){
        msg("a",reply);
        var mem=await getMemory();
        var count=parseInt(mem.find(function(m){return m.key==="conversation-count"})?.value||"0");
        await setMemory("conversation-count",String(count+1));
        var nameMatch=text.match(/my name is (\w+)/i);
        if(nameMatch)await setMemory("user-name",nameMatch[1]);
        notify("agent-memory",{count:(await getMemory()).length});
        status("Ready","ok",1);
      }).catch(function(err){status("Error: "+err.message,"err",0);});
    }
  });
}

if(!HEADLESS){
  b.onclick=send;i.onkeydown=function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
}
run();
</script>
</body>
</html>
